<!DOCTYPE html>
<!--
  Matrix Hand Hero — Dense Static Glow Version
  =============================================
  Embed as iframe:
    <iframe src="matrix-hand.html" style="position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;"></iframe>
  Or copy the two <canvas> elements + <script> directly into your page.

  TUNABLE CONSTANTS at top of <script>.
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Matrix Hand</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  #wrap{position:relative;width:100%;height:100%}
  canvas{position:absolute;top:0;left:0;display:block}
  #rc{z-index:1}
  #hc{z-index:2}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="rc"></canvas>
  <canvas id="hc"></canvas>
</div>
<script>
// ════════════════════════════════════════════════════════════
//  TUNABLE CONSTANTS
// ════════════════════════════════════════════════════════════
const C = {
  // Hand shape
  EMOJI        : '🖐️',        // open palm emoji — change to '✋' if preferred
  EMOJI_SIZE   : 480,          // offscreen canvas size (px) for sampling — bigger = sharper shape
  STRIDE       : 2,            // sample every N px — lower = denser (2 = ~5000 pts)
  ALPHA_THRESH : 90,           // 0-255 — pixel opacity to count as "inside hand"
  HAND_RATIO   : 0.58,         // hand height as fraction of viewport height

  // Particle appearance
  DOT_RADIUS   : 1.6,          // logical px radius of each particle dot
  CORE_COLOR   : '#00ff77',    // bright centre colour
  MID_COLOR    : '#00bb55',    // mid glow
  GLOW_SPRITE_R: 11,           // radius of the pre-rendered glow sprite

  // Animation — all in seconds / amplitudes
  // Fall-in on first load
  FALL_DURATION  : 1.8,        // total time for hand to assemble (top-down)
  // Idle (once formed)
  JITTER_AMP     : 0.9,        // max px of sine jitter (keep low for "calm" look)
  JITTER_SPEED   : 1.2,        // jitter oscillation speed multiplier
  FLICKER_RATE   : 0.007,      // fraction of particles that randomly flicker per frame

  // Matrix rain
  RAIN_FS      : 13,           // font size px
  RAIN_CHARS   : '0123456789ABCDEF',
  RAIN_FADE    : 'rgba(0,0,0,0.05)',   // trail fade per frame — lighter = longer trails
  RAIN_SPEED_MIN : 0.8,
  RAIN_SPEED_MAX : 2.2,
};
// ════════════════════════════════════════════════════════════

const DPR  = Math.min(window.devicePixelRatio||1, 2);
let W = 0, H = 0;

const rc   = document.getElementById('rc');
const hc   = document.getElementById('hc');
const rCtx = rc.getContext('2d');
const hCtx = hc.getContext('2d');

// ── Glow sprite (pre-rendered once) ──────────────────────────
let glowSprite = null;
function buildGlowSprite() {
  const r  = C.GLOW_SPRITE_R;
  const sz = r * 2 + 2;
  const oc = document.createElement('canvas');
  oc.width = oc.height = sz;
  const ox = oc.getContext('2d');
  const g  = ox.createRadialGradient(r+1, r+1, 0, r+1, r+1, r);
  g.addColorStop(0,    C.CORE_COLOR);
  g.addColorStop(0.4,  C.MID_COLOR);
  g.addColorStop(1,    'rgba(0,0,0,0)');
  ox.fillStyle = g;
  ox.fillRect(0, 0, sz, sz);
  glowSprite = oc;
}

// ── Sample hand shape from emoji ─────────────────────────────
let targets = [];   // [{x,y}] in logical px
function buildTargets() {
  const es = C.EMOJI_SIZE;
  const oc = document.createElement('canvas');
  oc.width = oc.height = es;
  const ox = oc.getContext('2d');
  ox.clearRect(0, 0, es, es);
  ox.font          = `${Math.floor(es * 0.82)}px serif`;
  ox.textAlign     = 'center';
  ox.textBaseline  = 'middle';
  ox.fillStyle     = '#fff';
  ox.fillText(C.EMOJI, es/2, es/2);

  const pix = ox.getImageData(0, 0, es, es).data;
  const raw = [];
  const st  = C.STRIDE;
  for (let py = 0; py < es; py += st)
    for (let px = 0; px < es; px += st)
      if (pix[(py*es+px)*4 + 3] >= C.ALPHA_THRESH)
        raw.push({ nx: px/es, ny: py/es });

  const hH  = H * C.HAND_RATIO;
  const hW  = hH;
  // Centre the hand: shift left slightly to sit right-of-centre on the iframe
  const oX  = (W - hW) / 2;
  const oY  = (H - hH) / 2 + H * 0.02;

  targets = raw.map(p => ({
    x: oX + p.nx * hW,
    y: oY + p.ny * hH,
  }));
}

// ── Particles ────────────────────────────────────────────────
let particles = [];
let fallStart = null;
let formed    = false;

function buildParticles() {
  // Sort top-down so fingertips fall first
  const sorted = [...targets].sort((a,b) => a.y - b.y);
  const total  = sorted.length;
  particles = sorted.map((t, i) => ({
    tx  : t.x,
    ty  : t.y,
    x   : t.x + (Math.random()-0.5)*12,
    y   : -Math.random() * H * 0.5 - 20,     // start above viewport
    vy  : 300 + Math.random() * 400,           // fall speed px/s
    delay: (i / total) * C.FALL_DURATION,      // staggered
    settled  : false,
    alpha    : 0,
    flicker  : 1,
    fTimer   : Math.random() * 2,
    jPhase   : Math.random() * Math.PI * 2,
    jSpeedX  : 0.8 + Math.random() * 0.8,
    jSpeedY  : 0.6 + Math.random() * 0.7,
    jAmp     : 0.3 + Math.random() * C.JITTER_AMP,
  }));
  fallStart = null;
  formed    = false;
}

// ── Rain columns ──────────────────────────────────────────────
let cols = [];
function buildRain() {
  const fs = C.RAIN_FS;
  const n  = Math.ceil(W / fs);
  cols = Array.from({length: n}, (_,i) => ({
    x    : i * fs,
    y    : Math.random() * H,
    speed: C.RAIN_SPEED_MIN + Math.random() * (C.RAIN_SPEED_MAX - C.RAIN_SPEED_MIN),
    char : C.RAIN_CHARS[Math.floor(Math.random()*C.RAIN_CHARS.length)],
    tick : 0,
  }));
}

function drawRain(dt) {
  rCtx.fillStyle = C.RAIN_FADE;
  rCtx.fillRect(0, 0, W, H);
  rCtx.font = `${C.RAIN_FS}px monospace`;
  const fs = C.RAIN_FS;
  for (const col of cols) {
    col.tick += dt * 60;
    if (col.tick >= 1) {
      col.tick -= 1;
      col.char  = C.RAIN_CHARS[Math.floor(Math.random()*C.RAIN_CHARS.length)];
      col.y    += fs * col.speed;
      if (col.y > H + fs) col.y = -fs;
      const lum = 18 + Math.floor(Math.random() * 35);
      rCtx.fillStyle = `hsl(140,75%,${lum}%)`;
      rCtx.fillText(col.char, col.x, col.y);
    }
  }
}

// ── Draw hand ─────────────────────────────────────────────────
function drawHand(now, dt) {
  hCtx.clearRect(0, 0, W, H);

  if (fallStart === null) fallStart = now;
  const elapsed = (now - fallStart) / 1000;

  const gs     = C.GLOW_SPRITE_R * 2 + 2;
  let allDone  = true;

  hCtx.globalCompositeOperation = 'screen'; // additive glow

  for (const p of particles) {
    if (!formed) {
      // ── FALL-IN phase ──
      const active = elapsed - p.delay;
      if (active < 0) { allDone = false; continue; }

      if (!p.settled) {
        allDone = false;
        p.y    += p.vy * dt;
        p.alpha = Math.min(1, active * 3);
        p.x    += (p.tx - p.x) * dt * 8;

        if (p.y >= p.ty) { p.y = p.ty; p.settled = true; }

        // short comet tail
        for (let t = 1; t <= 2; t++) {
          hCtx.globalAlpha = p.alpha * (0.25 - t*0.09);
          hCtx.drawImage(glowSprite, p.x - gs/2, p.y - t*9 - gs/2, gs, gs);
        }
      }
      hCtx.globalAlpha = p.alpha;
      hCtx.drawImage(glowSprite, p.x - gs/2, p.y - gs/2, gs, gs);

    } else {
      // ── IDLE (formed) phase — subtle jitter + flicker ──
      p.fTimer -= dt;
      if (p.fTimer <= 0) {
        p.flicker = (Math.random() < C.FLICKER_RATE * 60)
          ? 0.45 + Math.random() * 0.55
          : 0.85 + Math.random() * 0.15;
        p.fTimer  = 0.04 + Math.random() * 0.3;
      }
      const t   = now * 0.001;
      const jx  = Math.sin(t * p.jSpeedX + p.jPhase) * p.jAmp;
      const jy  = Math.cos(t * p.jSpeedY + p.jPhase) * p.jAmp * 0.6;
      hCtx.globalAlpha = p.flicker;
      hCtx.drawImage(glowSprite, (p.tx+jx) - gs/2, (p.ty+jy) - gs/2, gs, gs);
    }
  }

  hCtx.globalCompositeOperation = 'source-over';
  hCtx.globalAlpha = 1;

  if (!formed && allDone) formed = true;
}

// ── Resize ───────────────────────────────────────────────────
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  for (const [c, ctx] of [[rc, rCtx],[hc, hCtx]]) {
    c.width  = Math.round(W * DPR);
    c.height = Math.round(H * DPR);
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  buildRain();
  buildGlowSprite();
  buildTargets();
  buildParticles();
}

window.addEventListener('resize', resize);

// ── Main loop ─────────────────────────────────────────────────
let last = null;
function loop(now) {
  if (!last) last = now;
  const dt = Math.min((now - last)/1000, 0.05);
  last = now;
  drawRain(dt);
  drawHand(now, dt);
  requestAnimationFrame(loop);
}

// ── Init ──────────────────────────────────────────────────────
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
