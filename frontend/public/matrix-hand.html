<!DOCTYPE html>
<!--
  Matrix Shield Hero Effect
  =========================
  Fan Fraud Shield — Team KAY

  HOW TO EMBED:
  (1) As <iframe> background:
      <iframe src="matrix-shield.html"
        style="position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;">
      </iframe>

  (2) Copy the two <canvas> elements + <script> block directly into your page.
      Parent must have position:relative or position:absolute.
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Matrix Shield</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  #wrap{position:relative;width:100%;height:100%}
  canvas{position:absolute;top:0;left:0;display:block}
  #rc{z-index:1}
  #pc{z-index:2}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="rc"></canvas>
  <canvas id="pc"></canvas>
</div>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════
//  TUNABLE CONSTANTS — edit freely
// ══════════════════════════════════════════════════════════════
const CFG = {
  // Shield size
  SHIELD_H_RATIO : 0.62,      // shield height as fraction of viewport height
  SHIELD_CENTER_X: 0.50,      // horizontal centre (0–1 of viewport width)
  SHIELD_CENTER_Y: 0.50,      // vertical centre

  // Particle appearance
  GLOW_RADIUS    : 10,         // px — glow sprite radius
  CORE_COLOR     : '#39ff88',  // bright centre
  MID_COLOR      : '#00cc55',  // mid glow ring

  // Shape sampling
  SAMPLE_STRIDE  : 3,          // px step when scanning the shield mask (lower = more particles)
  TARGET_DENSITY : 3500,       // max particles (sub-sampled if too many)

  // Cycle timing (seconds)
  FALL_DUR      : 2.5,         // particles build the shield top-to-bottom over this time
  HOLD_DUR      : 5.0,         // how long shield stays fully formed
  DISPERSE_DUR  : 1.8,         // fade-out duration before next cycle

  // Idle (formed) feel
  JITTER_AMP    : 1.1,         // max px of sine micro-jitter
  FLICKER_PROB  : 0.004,       // chance per particle per frame to flicker

  // Matrix rain
  RAIN_FS       : 14,          // font size px
  RAIN_CHARS    : '0123456789ABCDEF',
  RAIN_FADE     : 'rgba(0,0,0,0.05)',
  RAIN_SPD_MIN  : 0.9,
  RAIN_SPD_MAX  : 2.6,
};
// ══════════════════════════════════════════════════════════════

const rc   = document.getElementById('rc');
const pc   = document.getElementById('pc');
const rCtx = rc.getContext('2d');
const pCtx = pc.getContext('2d');
const DPR  = Math.min(window.devicePixelRatio || 1, 2);

let W = 0, H = 0;
let rainCols = [];
let particles  = [];
let targets    = [];
let glowSprite = null;

// Phase state machine
const PH = { FALLING:0, LOCKED:1, DISPERSING:2 };
let phase = PH.FALLING, phaseT = 0, formed = false;

// ── Glow sprite ──────────────────────────────────────────────
function buildGlowSprite() {
  const r  = CFG.GLOW_RADIUS;
  const sz = r * 2 + 2;
  const oc = document.createElement('canvas');
  oc.width = oc.height = sz;
  const ox = oc.getContext('2d');
  const g  = ox.createRadialGradient(r+1,r+1,0, r+1,r+1,r);
  g.addColorStop(0,   CFG.CORE_COLOR);
  g.addColorStop(0.4, CFG.MID_COLOR);
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ox.fillStyle = g;
  ox.fillRect(0, 0, sz, sz);
  glowSprite = oc;
}

// ── Shield silhouette path (clean classic shield) ────────────
function shieldPath(ctx, cx, cy, sw, sh) {
  // sw = width, sh = height, classic heraldic shield
  const x = cx - sw/2, y = cy - sh/2;
  const r = sw * 0.15;   // corner radius

  ctx.beginPath();
  // Top-left arc
  ctx.moveTo(x + r, y);
  // Top edge
  ctx.lineTo(x + sw - r, y);
  // Top-right arc
  ctx.quadraticCurveTo(x + sw, y,       x + sw,     y + r);
  // Right side (straight then taper)
  ctx.lineTo(x + sw, y + sh * 0.52);
  // Lower-right curve to bottom point
  ctx.quadraticCurveTo(x + sw, y + sh * 0.80,  cx, y + sh);
  // Lower-left curve from bottom point
  ctx.quadraticCurveTo(x,      y + sh * 0.80,  x,  y + sh * 0.52);
  // Left side
  ctx.lineTo(x, y + r);
  // Top-left arc close
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Sample target points from shield shape ───────────────────
function buildTargets() {
  const sh  = H * CFG.SHIELD_H_RATIO;
  const sw  = sh * 0.78;                       // shield aspect ~0.78
  const cx  = W * CFG.SHIELD_CENTER_X;
  const cy  = H * CFG.SHIELD_CENTER_Y;

  // Draw shield on offscreen canvas to get mask
  const ow = Math.ceil(sw + 4), oh = Math.ceil(sh + 4);
  const oc = document.createElement('canvas');
  oc.width  = ow;
  oc.height = oh;
  const ox  = oc.getContext('2d');
  ox.clearRect(0, 0, ow, oh);

  // Translate so shield centre aligns with offscreen centre
  ox.save();
  ox.translate(ow/2, oh/2);
  shieldPath(ox, 0, 0, sw, sh);
  ox.restore();
  ox.fillStyle = '#fff';
  ox.fill();

  const pix  = ox.getImageData(0, 0, ow, oh).data;
  const st   = CFG.SAMPLE_STRIDE;
  const raw  = [];

  for (let py = 0; py < oh; py += st)
    for (let px = 0; px < ow; px += st)
      if (pix[(py * ow + px)*4 + 3] > 128)
        raw.push({
          // Convert offscreen coords back to viewport coords
          x: cx + (px - ow/2),
          y: cy + (py - oh/2),
        });

  // Sub-sample if too dense
  if (raw.length > CFG.TARGET_DENSITY) {
    const step = raw.length / CFG.TARGET_DENSITY;
    targets = [];
    for (let i = 0; i < CFG.TARGET_DENSITY; i++)
      targets.push(raw[Math.round(i * step)]);
  } else {
    targets = raw;
  }
}

// ── Build / reset particles ──────────────────────────────────
function buildParticles() {
  // Sort top→bottom so shield builds down from the crest
  const sorted = [...targets].sort((a, b) => a.y - b.y);
  const total  = sorted.length;
  particles = sorted.map((t, i) => ({
    tx: t.x, ty: t.y,
    x : t.x + (Math.random() - 0.5) * 20,
    y : -Math.random() * H * 0.6 - 20,
    vy: 250 + Math.random() * 380,
    delay   : (i / total) * CFG.FALL_DUR,
    settled : false,
    alpha   : 0,
    flicker : 1,
    fTimer  : Math.random() * 1.5,
    jPh     : Math.random() * Math.PI * 2,
    jSx     : 0.7 + Math.random() * 1.0,
    jSy     : 0.5 + Math.random() * 0.8,
    jAmp    : 0.3 + Math.random() * CFG.JITTER_AMP,
    ux      : (Math.random() - 0.5) * 180,  // disperse X drift
    uy      : -(80 + Math.random() * 200),  // disperse Y (upward)
  }));
  phase  = PH.FALLING;
  phaseT = 0;
  formed = false;
}

// ── Rain ─────────────────────────────────────────────────────
function buildRain() {
  const fs = CFG.RAIN_FS;
  const n  = Math.ceil(W / fs);
  rainCols = Array.from({length: n}, (_, i) => ({
    x    : i * fs,
    y    : Math.random() * H,
    speed: CFG.RAIN_SPD_MIN + Math.random()*(CFG.RAIN_SPD_MAX-CFG.RAIN_SPD_MIN),
    char : CFG.RAIN_CHARS[Math.floor(Math.random()*CFG.RAIN_CHARS.length)],
    tick : 0,
  }));
}

function drawRain(dt) {
  rCtx.fillStyle = CFG.RAIN_FADE;
  rCtx.fillRect(0, 0, W, H);
  rCtx.font = `${CFG.RAIN_FS}px monospace`;
  const fs = CFG.RAIN_FS;
  for (const col of rainCols) {
    col.tick += dt * 60;
    if (col.tick >= 1) {
      col.tick -= 1;
      col.char  = CFG.RAIN_CHARS[Math.floor(Math.random()*CFG.RAIN_CHARS.length)];
      col.y    += fs * col.speed;
      if (col.y > H + fs) col.y = -fs;
      const lum = 15 + Math.floor(Math.random() * 40);
      rCtx.fillStyle = `hsl(140,78%,${lum}%)`;
      rCtx.fillText(col.char, col.x, col.y);
    }
  }
}

// ── Draw particles ───────────────────────────────────────────
function drawParticles(now, dt) {
  pCtx.clearRect(0, 0, W, H);
  pCtx.globalCompositeOperation = 'screen';  // additive glow

  const gs = CFG.GLOW_RADIUS * 2 + 2;
  let allSettled = true;
  phaseT += dt;

  for (const p of particles) {

    // ── FALLING ──
    if (phase === PH.FALLING) {
      const active = phaseT - p.delay;
      if (active < 0) { allSettled = false; continue; }

      if (!p.settled) {
        allSettled = false;
        p.y    += p.vy * dt;
        p.x    += (p.tx - p.x) * dt * 7;
        p.alpha = Math.min(1, active * 2.5);
        if (p.y >= p.ty) { p.y = p.ty; p.settled = true; }

        // comet tail (2 dots above)
        for (let t = 1; t <= 2; t++) {
          pCtx.globalAlpha = p.alpha * (0.28 - t * 0.09);
          pCtx.drawImage(glowSprite, p.x - gs/2, p.y - t*9 - gs/2, gs, gs);
        }
      }
      pCtx.globalAlpha = p.alpha;
      pCtx.drawImage(glowSprite, p.x - gs/2, p.y - gs/2, gs, gs);

    // ── LOCKED / IDLE ──
    } else if (phase === PH.LOCKED) {
      p.fTimer -= dt;
      if (p.fTimer <= 0) {
        p.flicker = Math.random() < CFG.FLICKER_PROB * 60
          ? 0.35 + Math.random() * 0.65
          : 0.82 + Math.random() * 0.18;
        p.fTimer  = 0.05 + Math.random() * 0.35;
      }
      const t  = now * 0.001;
      const jx = Math.sin(t * p.jSx + p.jPh) * p.jAmp;
      const jy = Math.cos(t * p.jSy + p.jPh) * p.jAmp * 0.7;
      pCtx.globalAlpha = p.flicker;
      pCtx.drawImage(glowSprite, (p.tx+jx) - gs/2, (p.ty+jy) - gs/2, gs, gs);

    // ── DISPERSING ──
    } else if (phase === PH.DISPERSING) {
      const prog = Math.min(1, phaseT / CFG.DISPERSE_DUR);
      p.x += p.ux * dt;
      p.y += p.uy * dt;
      pCtx.globalAlpha = Math.max(0, 1 - prog * 1.4) * p.flicker;
      pCtx.drawImage(glowSprite, p.x - gs/2, p.y - gs/2, gs, gs);
    }
  }

  pCtx.globalCompositeOperation = 'source-over';
  pCtx.globalAlpha = 1;

  // ── Phase transitions ──
  if (phase === PH.FALLING && allSettled) {
    // Snapshot disperse positions
    for (const p of particles) { p.x = p.tx; p.y = p.ty; }
    phase = PH.LOCKED; phaseT = 0;
  }
  if (phase === PH.LOCKED && phaseT >= CFG.HOLD_DUR) {
    phase = PH.DISPERSING; phaseT = 0;
  }
  if (phase === PH.DISPERSING && phaseT >= CFG.DISPERSE_DUR + 0.4) {
    buildParticles(); // restart cycle
  }
}

// ── Resize ───────────────────────────────────────────────────
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  for (const [c, ctx] of [[rc, rCtx],[pc, pCtx]]) {
    c.width  = Math.round(W * DPR);
    c.height = Math.round(H * DPR);
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  buildRain();
  buildGlowSprite();
  buildTargets();
  buildParticles();
}

window.addEventListener('resize', resize);

// ── Reduced motion: static shield, no animation ──────────────
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── Main loop ─────────────────────────────────────────────────
let lastT = null;
function loop(now) {
  if (!lastT) lastT = now;
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  drawRain(dt);

  if (reducedMotion) {
    // Draw static formed shield
    pCtx.clearRect(0, 0, W, H);
    pCtx.globalCompositeOperation = 'screen';
    const gs = CFG.GLOW_RADIUS * 2 + 2;
    for (const t of targets) {
      pCtx.globalAlpha = 0.9;
      pCtx.drawImage(glowSprite, t.x - gs/2, t.y - gs/2, gs, gs);
    }
    pCtx.globalCompositeOperation = 'source-over';
    pCtx.globalAlpha = 1;
  } else {
    drawParticles(now, dt);
  }

  requestAnimationFrame(loop);
}

// ── Init ──────────────────────────────────────────────────────
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
